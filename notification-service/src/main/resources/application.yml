server:
  port: ${NOTIFICATION_SERVICE_PORT:8086}

spring:
  application:
    name: notification-service
  threads:
    virtual:
      enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          # MailHog has no auth, no TLS — keep it that way locally.
          auth: false
          starttls:
            enable: false
  thymeleaf:
    # Email templates only — Thymeleaf doesn't need to serve HTTP responses.
    cache: true
    prefix: classpath:/templates/
    suffix: .html

notifications:
  from-email: ${NOTIFICATIONS_FROM:noreply@skillswap.dev}

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
