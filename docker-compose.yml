# Full SkillSwap stack — postgres, rabbitmq, eureka, gateway, and 5 business services.
# All services build from the root Dockerfile via build-arg SERVICE=<module>.
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d --build
#
# Then:
#   - Swagger UI:    http://localhost:8080/swagger-ui.html
#   - Eureka:        http://localhost:8761  (eureka/eureka)
#   - RabbitMQ UI:   http://localhost:15672 (guest/guest)

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file: .env
  networks:
    - skillswap

x-service-env: &service-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  EUREKA_HOST: eureka
  EUREKA_PORT: 8761

services:

  # ─── Infra ──────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: skillswap-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - skillswap

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: skillswap-rabbitmq
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - skillswap

  # Dev-only SMTP capture: catches every email on port 1025, exposes a UI
  # at :8025 to read them. Nothing leaves the local machine.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: skillswap-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - skillswap

  # ─── Service discovery ──────────────────────────────────────────────────────

  eureka:
    build:
      context: .
      args:
        SERVICE: eureka-server
    image: skillswap/eureka-server
    container_name: skillswap-eureka
    <<: *service-defaults
    environment:
      EUREKA_HOST: eureka
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://${EUREKA_USER}:${EUREKA_PASSWORD}@localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Edge ───────────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      args:
        SERVICE: api-gateway
    image: skillswap/api-gateway
    container_name: skillswap-gateway
    <<: *service-defaults
    environment:
      <<: *service-env
    depends_on:
      eureka:
        condition: service_healthy
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  # ─── Business services ──────────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      args:
        SERVICE: auth-service
    image: skillswap/auth-service
    container_name: skillswap-auth
    <<: *service-defaults
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  user-service:
    build:
      context: .
      args:
        SERVICE: user-service
    image: skillswap/user-service
    container_name: skillswap-user
    <<: *service-defaults
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy
    ports:
      - "${USER_SERVICE_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  skill-service:
    build:
      context: .
      args:
        SERVICE: skill-service
    image: skillswap/skill-service
    container_name: skillswap-skill
    <<: *service-defaults
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy
    ports:
      - "${SKILL_SERVICE_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  matching-service:
    build:
      context: .
      args:
        SERVICE: matching-service
    image: skillswap/matching-service
    container_name: skillswap-matching
    <<: *service-defaults
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy
    ports:
      - "${MATCHING_SERVICE_PORT:-8084}:8084"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  session-service:
    build:
      context: .
      args:
        SERVICE: session-service
    image: skillswap/session-service
    container_name: skillswap-session
    <<: *service-defaults
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy
    ports:
      - "${SESSION_SERVICE_PORT:-8085}:8085"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  moderation-service:
    build:
      context: .
      args:
        SERVICE: moderation-service
    image: skillswap/moderation-service
    container_name: skillswap-moderation
    <<: *service-defaults
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy
    ports:
      - "${MODERATION_SERVICE_PORT:-8087}:8087"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8087/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  notification-service:
    build:
      context: .
      args:
        SERVICE: notification-service
    image: skillswap/notification-service
    container_name: skillswap-notification
    <<: *service-defaults
    environment:
      <<: *service-env
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8086}:8086"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── Observability (Phase 4) ────────────────────────────────────────────────
  # Prometheus scrapes /actuator/prometheus on every Spring Boot service.
  # Grafana auto-loads the Prometheus datasource and the SkillSwap dashboard.

  prometheus:
    image: prom/prometheus:latest
    container_name: skillswap-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - skillswap

  grafana:
    image: grafana/grafana:latest
    container_name: skillswap-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - skillswap

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  skillswap:
    driver: bridge
