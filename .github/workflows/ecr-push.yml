name: Build, Push & Deploy to ECS

on:
  push:
    branches: [main]
    paths:
      - 'api-gateway/**'
      - 'auth-service/**'
      - 'matching-service/**'
      - 'moderation-service/**'
      - 'notification-service/**'
      - 'session-service/**'
      - 'skill-service/**'
      - 'user-service/**'
      - 'eureka-server/**'
      - 'Dockerfile'
      - 'pom.xml'
      - '.github/workflows/ecr-push.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 695875594472.dkr.ecr.eu-north-1.amazonaws.com
  ECS_CLUSTER: skillswap-prod

jobs:
  build-push-deploy:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: eureka-server
            port: 8761
          - service: api-gateway
            port: 8080
          - service: auth-service
            port: 8081
          - service: user-service
            port: 8082
          - service: skill-service
            port: 8083
          - service: matching-service
            port: 8084
          - service: session-service
            port: 8085
          - service: notification-service
            port: 8086
          - service: moderation-service
            port: 8087

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: ${{ env.ECR_REGISTRY }}/skillswap/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Render ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definitions/${{ matrix.service }}.json
          container-name: ${{ matrix.service }}
          image: ${{ env.ECR_REGISTRY }}/skillswap/${{ matrix.service }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ matrix.service }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false
