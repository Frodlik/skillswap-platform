name: CI

# Runs on every push to main and on pull requests targeting main.
# Two parallel jobs:
#   - backend: compiles all Maven modules and runs unit + integration tests
#   - frontend: installs deps and runs the Vite build (catches type/import errors)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one CI run per ref at a time — newer pushes cancel older runs
# so a quick succession of commits doesn't pile up minutes on the queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  backend:
    name: Backend (Java 21 · Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          # Auto-caches ~/.m2/repository keyed on pom.xml hashes — pulls
          # warm cache on subsequent runs so dependency resolution skips
          # the long cold download.
          cache: maven

      - name: Build + test all modules
        # `verify` runs Surefire (unit tests) and Failsafe (integration tests).
        # Integration tests use Testcontainers; Docker is preinstalled on
        # ubuntu-latest runners.
        run: mvn -B -ntp clean verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**'
          retention-days: 7

  frontend:
    name: Frontend (Node 20 · Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # `npm ci` is the CI-friendly install — fails if package-lock.json
        # is out of sync, never mutates the lockfile.
        run: npm ci

      - name: Build
        # `vite build` performs an esbuild + Rollup pass; any unresolved
        # imports or syntax errors fail the build.
        run: npm run build
