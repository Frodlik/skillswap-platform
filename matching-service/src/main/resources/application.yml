server:
  port: ${MATCHING_SERVICE_PORT:8084}

spring:
  application:
    name: matching-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/matching_db
    username: ${POSTGRES_USER:skillswap}
    password: ${POSTGRES_PASSWORD:skillswap}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

services:
  user-service:
    base-url: http://user-service
  skill-service:
    base-url: http://skill-service

matching:
  weights:
    skill-match: ${MATCHING_W_SKILL_MATCH:0.30}
    jaccard: ${MATCHING_W_JACCARD:0.20}
    reciprocity: ${MATCHING_W_RECIPROCITY:0.10}
    availability: ${MATCHING_W_AVAILABILITY:0.15}
    language: ${MATCHING_W_LANGUAGE:0.10}
    rating: ${MATCHING_W_RATING:0.10}
    timezone: ${MATCHING_W_TIMEZONE:0.05}

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
      skill-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
