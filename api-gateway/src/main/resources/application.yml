server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      auth-service:
        baseConfig: default
      user-service:
        baseConfig: default
      skill-service:
        baseConfig: default
      matching-service:
        baseConfig: default
      session-service:
        baseConfig: default

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

jwt:
  public-key: classpath:keys/public.pem
  public-paths:
    - /api/v1/auth/**
    - /actuator/health
    - /actuator/info
    - /fallback/**
