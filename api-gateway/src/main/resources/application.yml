server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  cloud:
    loadbalancer:
      cache:
        ttl: 5s
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      auth-service:
        baseConfig: default
      user-service:
        baseConfig: default
      skill-service:
        baseConfig: default
      matching-service:
        baseConfig: default
      session-service:
        baseConfig: default

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

jwt:
  public-key: ${JWT_PUBLIC_KEY:classpath:keys/public.pem}
  public-paths:
    - /api/v1/auth/**
    - /actuator/health
    - /actuator/info
    - /actuator/prometheus
    - /fallback/**
    - /swagger-ui.html
    - /swagger-ui/**
    - /api-docs/**
    - /v3/api-docs/**

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: 1. auth-service
        url: /api-docs/auth
      - name: 2. user-service
        url: /api-docs/user
      - name: 3. skill-service
        url: /api-docs/skill
      - name: 4. matching-service
        url: /api-docs/matching
      - name: 5. session-service
        url: /api-docs/session
