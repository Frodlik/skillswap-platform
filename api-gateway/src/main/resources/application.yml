server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  cloud:
    loadbalancer:
      cache:
        ttl: 30s  # keep Eureka instance list warm; 5s caused first-request failures after idle
      retry:
        enabled: true
        retry-on-all-operations: true   # retry GET *and* POST when no instance is yet known
        max-retries-on-same-service-instance: 0
        max-retries-on-next-service-instance: 2
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      auth-service:
        baseConfig: default
      user-service:
        baseConfig: default
      skill-service:
        baseConfig: default
      matching-service:
        baseConfig: default
      session-service:
        baseConfig: default
      moderation-service:
        baseConfig: default

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    # Default registry-fetch is 30s — on cold start the gateway can wait that
    # long before seeing a freshly-registered service, which produced
    # "service unavailable" on the very first request. Backend services already
    # set this to 5s; the gateway was missing the same tuning.
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

jwt:
  public-key: ${JWT_PUBLIC_KEY:classpath:keys/public.pem}
  public-paths:
    - /api/v1/auth/**
    - /actuator/health
    - /actuator/info
    - /actuator/prometheus
    - /fallback/**
    - /swagger-ui.html
    - /swagger-ui/**
    - /api-docs/**
    - /v3/api-docs/**

rate-limit:
  auth-requests-per-minute: ${RATE_LIMIT_AUTH_RPM:100}
  api-requests-per-minute: ${RATE_LIMIT_API_RPM:200}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: 1. auth-service
        url: /api-docs/auth
      - name: 2. user-service
        url: /api-docs/user
      - name: 3. skill-service
        url: /api-docs/skill
      - name: 4. matching-service
        url: /api-docs/matching
      - name: 5. session-service
        url: /api-docs/session
